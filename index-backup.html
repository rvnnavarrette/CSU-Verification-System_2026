<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSU Verification System — Login</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
</head>
<body class="auth-page-body">

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay d-none">
        <div class="loading-spinner-wrap">
            <div class="spinner-border text-success" style="width: 3rem; height: 3rem;" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <p class="loading-text mt-3 mb-0">Please wait...</p>
        </div>
    </div>

    <!-- Alert Container -->
    <div id="alertContainer" class="alert-container"></div>

    <!-- Main Auth Layout — full-page background, centered card -->
    <div class="auth-center-wrap">
        <div class="auth-card">

            <!-- Card Brand Header -->
            <div class="auth-card-header">
                <img src="csu-logo.png" alt="CSU Logo" class="auth-card-logo-img">
                <div class="auth-card-brand-info">
                    <div class="auth-card-university">Cagayan State University</div>
                    <div class="auth-card-office">Registrar's Office — Verification Portal</div>
                </div>
            </div>

            <hr class="auth-card-divider">

            <!-- Tab Switcher -->
            <div class="auth-tab-switcher">
                <button class="auth-tab active" id="loginTab" onclick="showLogin()">
                    Sign In
                </button>
                <button class="auth-tab" id="registerTab" onclick="showRegister()">
                    Create Account
                </button>
                <div class="auth-tab-indicator" id="tabIndicator"></div>
            </div>

            <!-- ===== LOGIN FORM ===== -->
            <form id="loginForm" onsubmit="handleLogin(event)" novalidate>
                <div class="auth-form-header">
                    <h3 class="auth-form-title">Welcome back</h3>
                    <p class="auth-form-subtitle">Sign in to access your verification portal</p>
                </div>

                <!-- Email Field -->
                <div class="auth-field-group">
                    <div class="auth-input-wrapper">
                        <i class="bi bi-envelope auth-input-icon"></i>
                        <input
                            type="email"
                            class="auth-input"
                            id="loginEmail"
                            placeholder="Email address"
                            required
                            autocomplete="email"
                        >
                        <div class="auth-input-valid-icon d-none">
                            <i class="bi bi-check-circle-fill text-success"></i>
                        </div>
                    </div>
                    <div class="auth-field-error" id="loginEmailError"></div>
                </div>

                <!-- Password Field -->
                <div class="auth-field-group">
                    <div class="auth-input-wrapper">
                        <i class="bi bi-lock auth-input-icon"></i>
                        <input
                            type="password"
                            class="auth-input"
                            id="loginPassword"
                            placeholder="Password"
                            required
                            minlength="6"
                            autocomplete="current-password"
                        >
                        <button type="button" class="auth-pwd-toggle" onclick="togglePassword('loginPassword', this)" tabindex="-1">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                    <div class="auth-field-error" id="loginPasswordError"></div>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="auth-submit-btn" id="loginBtn">
                    <span class="btn-text">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
                    </span>
                    <span class="btn-loading d-none">
                        <span class="spinner-border spinner-border-sm me-2" role="status"></span>
                        Signing in...
                    </span>
                </button>

                <!-- Admin link -->
                <div class="auth-bottom-link">
                    <a href="admin-login.html" class="auth-link-muted">
                        <i class="bi bi-shield-lock me-1"></i>Admin access
                    </a>
                </div>
            </form>

            <!-- ===== REGISTER FORM ===== -->
            <form id="registerForm" class="d-none" onsubmit="handleRegister(event)" novalidate>
                <div class="auth-form-header">
                    <h3 class="auth-form-title">Create account</h3>
                    <p class="auth-form-subtitle">Register to submit verification requests</p>
                </div>

                <!-- Full Name -->
                <div class="auth-field-group">
                    <div class="auth-input-wrapper">
                        <i class="bi bi-person auth-input-icon"></i>
                        <input
                            type="text"
                            class="auth-input"
                            id="registerName"
                            placeholder="Full name"
                            required
                            autocomplete="name"
                        >
                    </div>
                    <div class="auth-field-error" id="registerNameError"></div>
                </div>

                <!-- Email -->
                <div class="auth-field-group">
                    <div class="auth-input-wrapper">
                        <i class="bi bi-envelope auth-input-icon"></i>
                        <input
                            type="email"
                            class="auth-input"
                            id="registerEmail"
                            placeholder="Email address"
                            required
                            autocomplete="email"
                        >
                    </div>
                    <div class="auth-field-error" id="registerEmailError"></div>
                </div>

                <!-- Password -->
                <div class="auth-field-group">
                    <div class="auth-input-wrapper">
                        <i class="bi bi-lock auth-input-icon"></i>
                        <input
                            type="password"
                            class="auth-input"
                            id="registerPassword"
                            placeholder="Password (min. 6 characters)"
                            required
                            minlength="6"
                            autocomplete="new-password"
                            oninput="updatePasswordStrength(this.value)"
                        >
                        <button type="button" class="auth-pwd-toggle" onclick="togglePassword('registerPassword', this)" tabindex="-1">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                    <!-- Password Strength Bar -->
                    <div class="password-strength-bar" id="strengthBar">
                        <div class="strength-track">
                            <div class="strength-fill" id="strengthFill"></div>
                        </div>
                        <span class="strength-label" id="strengthLabel"></span>
                    </div>
                    <div class="auth-field-error" id="registerPasswordError"></div>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="auth-submit-btn" id="registerBtn">
                    <span class="btn-text">
                        <i class="bi bi-person-plus me-2"></i>Create Account
                    </span>
                    <span class="btn-loading d-none">
                        <span class="spinner-border spinner-border-sm me-2" role="status"></span>
                        Creating account...
                    </span>
                </button>

                <!-- Admin link -->
                <div class="auth-bottom-link">
                    <a href="admin-login.html" class="auth-link-muted">
                        <i class="bi bi-shield-lock me-1"></i>Admin access
                    </a>
                </div>
            </form>

            <!-- Card Footer -->
            <div class="auth-card-footer">
                &copy; 2026 CSU Registrar &mdash; Document Verification System
            </div>

        </div>

    </div>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/auth.js"></script>

    <script>
        // ---- Session check on load ----
        supabaseClient.auth.getSession().then(async ({ data: { session } }) => {
            if (session) {
                await redirectBasedOnRole(session.user);
            }
        });

        // ---- Tab switching ----
        function showLogin() {
            document.getElementById("loginForm").classList.remove("d-none");
            document.getElementById("registerForm").classList.add("d-none");
            document.getElementById("loginTab").classList.add("active");
            document.getElementById("registerTab").classList.remove("active");
            moveTabIndicator("loginTab");
            clearAllErrors();
        }

        function showRegister() {
            document.getElementById("loginForm").classList.add("d-none");
            document.getElementById("registerForm").classList.remove("d-none");
            document.getElementById("loginTab").classList.remove("active");
            document.getElementById("registerTab").classList.add("active");
            moveTabIndicator("registerTab");
            clearAllErrors();
        }

        function moveTabIndicator(activeTabId) {
            const indicator = document.getElementById("tabIndicator");
            const tab = document.getElementById(activeTabId);
            indicator.style.left = tab.offsetLeft + "px";
            indicator.style.width = tab.offsetWidth + "px";
        }

        // Initialize tab indicator position on load
        window.addEventListener("load", () => {
            moveTabIndicator("loginTab");
        });

        // ---- Password visibility toggle ----
        function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
            const icon = btn.querySelector("i");
            if (input.type === "password") {
                input.type = "text";
                icon.className = "bi bi-eye-slash";
            } else {
                input.type = "password";
                icon.className = "bi bi-eye";
            }
        }

        // ---- Password strength ----
        function updatePasswordStrength(password) {
            const fill = document.getElementById("strengthFill");
            const label = document.getElementById("strengthLabel");
            const bar = document.getElementById("strengthBar");

            if (!password) {
                bar.classList.remove("visible");
                return;
            }
            bar.classList.add("visible");

            let score = 0;
            if (password.length >= 6) score++;
            if (password.length >= 10) score++;
            if (/[A-Z]/.test(password)) score++;
            if (/[0-9]/.test(password)) score++;
            if (/[^A-Za-z0-9]/.test(password)) score++;

            const levels = [
                { pct: "20%",  color: "#dc3545", text: "Very weak" },
                { pct: "40%",  color: "#fd7e14", text: "Weak" },
                { pct: "60%",  color: "#ffc107", text: "Fair" },
                { pct: "80%",  color: "#20c997", text: "Good" },
                { pct: "100%", color: "#198754", text: "Strong" }
            ];
            const level = levels[Math.min(score, 4)];
            fill.style.width = level.pct;
            fill.style.backgroundColor = level.color;
            label.textContent = level.text;
            label.style.color = level.color;
        }

        // ---- Validation helpers ----
        function showFieldError(fieldId, message) {
            const el = document.getElementById(fieldId);
            if (el) { el.textContent = message; el.classList.add("visible"); }
        }

        function clearFieldError(fieldId) {
            const el = document.getElementById(fieldId);
            if (el) { el.textContent = ""; el.classList.remove("visible"); }
        }

        function clearAllErrors() {
            ["loginEmailError","loginPasswordError","registerNameError",
             "registerEmailError","registerPasswordError"]
            .forEach(clearFieldError);
        }

        // ---- Loading button state ----
        function setButtonLoading(btnId, isLoading) {
            const btn = document.getElementById(btnId);
            if (!btn) return;
            const text = btn.querySelector(".btn-text");
            const load = btn.querySelector(".btn-loading");
            btn.disabled = isLoading;
            if (isLoading) {
                text.classList.add("d-none");
                load.classList.remove("d-none");
            } else {
                text.classList.remove("d-none");
                load.classList.add("d-none");
            }
        }

        // ---- Handle Login ----
        async function handleLogin(e) {
            e.preventDefault();
            clearAllErrors();

            const email    = document.getElementById("loginEmail").value.trim();
            const password = document.getElementById("loginPassword").value;

            let valid = true;
            if (!email) { showFieldError("loginEmailError", "Email is required."); valid = false; }
            if (!password) { showFieldError("loginPasswordError", "Password is required."); valid = false; }
            if (!valid) return;

            setButtonLoading("loginBtn", true);
            showLoading(true);

            const result = await loginUser(email, password);

            showLoading(false);
            setButtonLoading("loginBtn", false);

            if (result.success) {
                await redirectBasedOnRole(result.user);
            } else {
                showAlert(escapeHtml(result.error), "danger");
            }
        }

        // ---- Handle Register ----
        async function handleRegister(e) {
            e.preventDefault();
            clearAllErrors();

            const name     = document.getElementById("registerName").value.trim();
            const email    = document.getElementById("registerEmail").value.trim();
            const password = document.getElementById("registerPassword").value;

            let valid = true;
            if (!name)     { showFieldError("registerNameError",    "Full name is required.");        valid = false; }
            if (!email)    { showFieldError("registerEmailError",   "Email is required.");             valid = false; }
            if (password.length < 6) { showFieldError("registerPasswordError", "Password must be at least 6 characters."); valid = false; }
            if (!valid) return;

            setButtonLoading("registerBtn", true);
            showLoading(true);

            const result = await registerUser(email, password, name);

            showLoading(false);
            setButtonLoading("registerBtn", false);

            if (result.success) {
                window.location.href = "user-dashboard.html";
            } else {
                showAlert(escapeHtml(result.error), "danger");
            }
        }

        // ---- Utilities ----
        function showLoading(show) {
            const overlay = document.getElementById("loadingOverlay");
            if (show) overlay.classList.remove("d-none");
            else overlay.classList.add("d-none");
        }

        function escapeHtml(str) {
            if (typeof str !== "string") return String(str);
            return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
                      .replace(/"/g,"&quot;").replace(/'/g,"&#39;");
        }

        function showAlert(message, type = "info") {
            const container = document.getElementById("alertContainer");
            const alert = document.createElement("div");
            alert.className = `alert alert-${type} alert-dismissible fade show`;
            alert.innerHTML = `<i class="bi bi-exclamation-triangle-fill me-2"></i>${message}<button type="button" class="btn-close" data-bs-dismiss="alert"></button>`;
            container.appendChild(alert);
            setTimeout(() => alert.remove(), 6000);
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
